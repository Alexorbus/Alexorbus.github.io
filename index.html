<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
      color: white;
    }

    /*this is the scene layers, you shouldnt have to change this, the order is right below this*/
    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .layer {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    /*this part is the order of the layers, starting at 1 */
    #background { z-index: 1; }
    #desk { z-index: 2; }
    #character { z-index: 3; }
    #overlay { z-index: 4; }

    /*the dialog box */
    #dialogueBox {
      position: absolute;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
      z-index: 5;
      cursor: pointer;
    }

    #dialogueText {
      font-size: 18px;
    }

    /* the update/goals text */
    #meta {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 6;
      font-size: 12px;
      opacity: 0.5;
    }

    .update, .goals {
      display: block;
    }
  </style>
</head>

<body>

  <div class="scene">

    <!-- actual layers, easy to edit too -->
    <img id="background" class="layer" src="placeholderbackround.png">
    <img id="desk" class="layer" src="deskplaceholder.png">
    <img id="character" class="layer" src="placeholderduck.png">
    <img id="overlay" class="layer" src="newoverlayplaceholder.png">

    <!-- the goals n stuff -->
    <div id="meta">
      <span class="update">last updated 4/28/26 16:26</span>
      <span class="goals">:This update: intro system working</span>
    </div>

    <!-- dialog box -->
    <div id="dialogueBox">
      <div id="dialogueText">…</div>
    </div>

  </div>

  <script>
    const dialogue = [
      "…",
      "you’re watching something",
      "this is not a broadcast",
      "but it is still being shown",
      "today’s topic:",
      "things i find interesting",
      "click again"
    ];

    let index = 0;
    const textBox = document.getElementById("dialogueText");

    function nextLine() {
      if (index < dialogue.length) {
        textBox.textContent = dialogue[index];
        index++;
      } else {
        index = 0;
        textBox.textContent = "...";
      }
    }

    document.getElementById("dialogueBox").onclick = nextLine;

    // first line
    nextLine();
  </script>

</body>
</html>
