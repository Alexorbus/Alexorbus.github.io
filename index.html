<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
      color: white;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #background {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    #desk {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 3;
    }

    #character {
  position: absolute;
  bottom: 180px;
  left: 80px;
  width: 420px;      
  max-width: none;  
  height: auto;
  z-index: 2;
}

    #overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: contain;   
  top: 0;
  left: 0;
  z-index: 4;
  pointer-events: none;
}

    #dialogueBox {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
      z-index: 5;
      cursor: pointer;
    }

    #dialogueText {
      font-size: 18px;
    }

    #meta {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 6;
      font-size: 12px;
      opacity: 0.5;
    }

    .update, .goals {
      display: block;
    }
  </style>
</head>

<body>

  <div class="scene">

    <img id="background" src="placeholderbackround.png">
    <img id="character" src="placeholderduck.png">
    <img id="desk" src="deskplaceholder.png">
    <img id="overlay" src="newoverlayplaceholder.png">

    <div id="meta">
      <span class="update">last updated 5/1/26 16:46</span>
      <span class="goals">:This update: Penguin should no longer scale with window, and news overlay should be uncropped </span>
    </div>

    <div id="dialogueBox">
      <div id="dialogueText">...</div>
    </div>

  </div>

  <script>
    const dialogue = [
      "...",
      "broadcast starting",
      "this is not live",
      "but it is still happening",
      "todays topic:",
      "things i care about"
    ];

    let index = 0;
    const textBox = document.getElementById("dialogueText");

    function nextLine() {
      if (index < dialogue.length) {
        textBox.textContent = dialogue[index];
        index++;
      } else {
        index = 0;
        textBox.textContent = "...";
      }
    }

    document.getElementById("dialogueBox").onclick = nextLine;

    nextLine();
  </script>

</body>
</html>
