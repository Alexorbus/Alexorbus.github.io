<!DOCTYPE html>
<html>
<head>
  <style>
    body {

      margin: 0;
      background: black;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
    }

    
   .screen {
  width: 1920px;
  height: 1080px;
  position: absolute;

  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%)
             scale(calc(min(100vw / 1920, 100vh / 1080)));
}

   
    @media (max-width: 1920px), (max-height: 1080px) {
      .screen {
        transform: scale(calc(min(100vw / 1920, 100vh / 1080)));
      }
    }

   

    #background {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    #character {
      position: absolute;
      bottom: 180px;
      left: 80px;
      width: 420px;
      z-index: 2;
    }

    #desk {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 3;
    }

    #overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
      top: 0;
      left: 0;
      z-index: 4;
      pointer-events: none;
    }

   

    #dialogueBox {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      width: 1400px;
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
      z-index: 5;
      cursor: pointer;
    }

    #dialogueText {
      font-size: 28px;
    }

    

    #meta {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 6;
      font-size: 16px;
      opacity: 0.5;
    }

    .update, .goals {
      display: block;
    }
  </style>
</head>

<body>

  <div class="screen">

    
    <img id="background" src="placeholderbackround.png">
    <img id="character" src="placeholderduck.png">
    <img id="desk" src="deskplaceholder.png">
    <img id="overlay" src="newoverlayplaceholder.png">

    
    <div id="meta">
      <span class="update">last updated 5/1/26 17:02</span>
      <span class="goals">:This update: Changed screen rules</span>
    </div>

    
    <div id="dialogueBox">
      <div id="dialogueText">...</div>
    </div>

  </div>

  <script>
    const dialogue = [
      "...",
      "broadcast starting",
      "this is not live",
      "but it is still happening",
      "todays topic:",
      "things i care about"
    ];

    let index = 0;
    const textBox = document.getElementById("dialogueText");

    function nextLine() {
      if (index < dialogue.length) {
        textBox.textContent = dialogue[index];
        index++;
      } else {
        index = 0;
        textBox.textContent = "...";
      }
    }

    document.getElementById("dialogueBox").onclick = nextLine;

    nextLine();
  </script>

</body>
</html>
