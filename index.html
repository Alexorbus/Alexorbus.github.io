<!DOCTYPE html>
<html>
<head>
  <style>
    #intro {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 9999;
  display: flex;
  justify-content: center;
  align-items: center;
}

#intro video,
#intro img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.fade-out {
  opacity: 0;
  transition: opacity 1s ease;
}
    body {
      background: url('backround2.gif') repeat;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    img {
      max-width: 90%;
      height: auto;
      margin: 20px;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
    }

    .update {
      display: block;
      opacity: 0.5;
      font-size: 0.8em;
      margin-top: 5px;
    }

    .goals {
      display: block;
      opacity: 0.5;
      font-size: 0.8em;
      margin-top: 3px;
    }

    a {
      color: cyan;
      text-decoration: none;
      display: block;
      margin: 10px;
    }
  </style>
</head>
  <script>
  const introVideo = document.getElementById("introVideo");
  const introLoop = document.getElementById("introLoop");
  const outroVideo = document.getElementById("outroVideo");
  const introContainer = document.getElementById("intro");

  
  introVideo.onended = () => {
    introVideo.style.display = "none";
    introLoop.style.display = "block";
  };

  // clicks 
  introContainer.onclick = () => {
    if (introLoop.style.display === "block") {
      introLoop.style.display = "none";
      outroVideo.style.display = "block";
      outroVideo.play();
    }
  };

  
  outroVideo.onended = () => {
    introContainer.classList.add("fade-out");

    setTimeout(() => {
      introContainer.style.display = "none";
    }, 1000);
  };
</script>
<body>
<div id="intro">

  <video id="introVideo" autoplay muted playsinline>
    <source src="intro.mp4" type="video/mp4">
  </video>

  <img id="introLoop" src="introloop.gif" style="display:none;">

  <video id="outroVideo" playsinline style="display:none;">
    <source src="outro.mp4" type="video/mp4">
  </video>

</div>
  <h1>Alex (or bus)</h1>
  <p>
    v11
    <span class="update">last updated 4/28/26 16:26</span>
    <span class="goals">:This update: attempt to add intro  </span>
  </p>

  <img src="Placeholder710x711.png">
  <img src="placeholdr1259x643.png">

  <h2>no other links yet</h2>
  <a href="https://www.instagram.com/alexorbus/" target="_blank">
    Instagram
  </a>

</body>
</html>
