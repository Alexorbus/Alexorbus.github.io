<!DOCTYPE html>
<html>
<head>
  <style>
    #intro {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #intro video,
    #intro img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .fade-out {
      opacity: 0;
      transition: opacity 1s ease;
    }

    body {
      background: url('backround2.gif') repeat;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    img {
      max-width: 90%;
      height: auto;
      margin: 20px;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px;
    }

    .update {
      display: block;
      opacity: 0.5;
      font-size: 0.8em;
      margin-top: 5px;
    }

    .goals {
      display: block;
      opacity: 0.5;
      font-size: 0.8em;
      margin-top: 3px;
    }

    a {
      color: cyan;
      text-decoration: none;
      display: block;
      margin: 10px;
    }
  </style>
</head>

<body>

  <div id="intro">

    <video id="introVideo" autoplay muted playsinline>
      <source src="intro.mp4" type="video/mp4">
    </video>

    <img id="introLoop" src="introloop.gif" style="display:none;">

    <video id="outroVideo" playsinline style="display:none;">
      <source src="outro.mp4" type="video/mp4">
    </video>

  </div>

  <audio id="bgMusic" loop>
    <source src="backmusic.mp4" type="audio/mp4">
  </audio>

  <h1>Alex (or bus)</h1>
  <p>
    v11
    <span class="update">last updated 4/28/26 16:26</span>
    <span class="goals">:This update: intro system working</span>
  </p>

  <img src="Placeholder710x711.png">
  <img src="placeholdr1259x643.png">

  <h2>nothing else here</h2>
  <a href="https://www.instagram.com/alexorbus/" target="_blank">
    Instagram
  </a>

  <script>
    const introVideo = document.getElementById("introVideo");
    const introLoop = document.getElementById("introLoop");
    const outroVideo = document.getElementById("outroVideo");
    const introContainer = document.getElementById("intro");
    const bgMusic = document.getElementById("bgMusic");

    // intro to loop
    introVideo.onended = () => {
      introVideo.style.display = "none";
      introLoop.style.display = "block";
    };

    // click to outro and music
    introContainer.onclick = () => {
      if (introLoop.style.display !== "none") {
        introLoop.style.display = "none";
        outroVideo.style.display = "block";
        outroVideo.play();

        // start music
        bgMusic.volume = 0;
        bgMusic.play();

        // fade in music
        let vol = 0;
        const fade = setInterval(() => {
          if (vol < 0.5) {
            vol += 0.01;
            bgMusic.volume = vol;
          } else {
            clearInterval(fade);
          }
        }, 100);
      }
    };

    // outro then fade to site
    outroVideo.onended = () => {
      introContainer.classList.add("fade-out");

      setTimeout(() => {
        introContainer.style.display = "none";
      }, 1000);
    };
  </script>

</body>
</html>
